name: Test casks
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  audit:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Symlink checkout as a Homebrew tap
        run: |
          set -euo pipefail
          taps_dir="$(brew --repository)/Library/Taps/reyemtech"
          mkdir -p "$taps_dir"
          ln -sf "$GITHUB_WORKSPACE" "$taps_dir/homebrew-tap"
      - run: brew audit --strict --tap reyemtech/tap
